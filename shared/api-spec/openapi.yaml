openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI Career Recommendations API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: career
    description: Career recommendation operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /skill-gap/get-skills:
    post:
      operationId: getSkillsForCareer
      tags: [career]
      summary: Get required skills for a career goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetSkillsRequest"
      responses:
        "200":
          description: Skills required for the career
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSkillsResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /skill-gap/analyze:
    post:
      operationId: analyzeSkillGap
      tags: [career]
      summary: Analyze skill gap and generate learning roadmap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillGapRequest"
      responses:
        "200":
          description: Skill gap analysis with roadmap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillGapAnalysis"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /career/recommend:
    post:
      operationId: getCareerRecommendation
      tags: [career]
      summary: Get career recommendation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CareerQuizAnswers"
      responses:
        "200":
          description: Career recommendation with roadmap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerRecommendation"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /career/questions:
    get:
      operationId: getCareerQuestions
      tags: [career]
      summary: Get quiz questions
      responses:
        "200":
          description: List of quiz questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerQuestionsResponse"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to returnTo path on success.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    GetSkillsRequest:
      type: object
      required: [careerGoal]
      properties:
        careerGoal:
          type: string
    GetSkillsResponse:
      type: object
      required: [careerGoal, skills]
      properties:
        careerGoal:
          type: string
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillRequirement"
    SkillRequirement:
      type: object
      required: [name, requiredLevel, description]
      properties:
        name:
          type: string
        requiredLevel:
          type: number
        description:
          type: string
        category:
          type: string
    SkillGapRequest:
      type: object
      required: [careerGoal, currentSkills]
      properties:
        careerGoal:
          type: string
        currentSkills:
          type: array
          items:
            $ref: "#/components/schemas/CurrentSkill"
    CurrentSkill:
      type: object
      required: [name, currentLevel, requiredLevel]
      properties:
        name:
          type: string
        currentLevel:
          type: number
        requiredLevel:
          type: number
    SkillGapAnalysis:
      type: object
      required: [careerGoal, overallReadiness, skills, roadmap, estimatedTime]
      properties:
        careerGoal:
          type: string
        overallReadiness:
          type: number
        estimatedTime:
          type: string
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillGapItem"
        roadmap:
          type: array
          items:
            $ref: "#/components/schemas/LearningPhase"
    SkillGapItem:
      type: object
      required: [name, currentLevel, requiredLevel, gap, priority]
      properties:
        name:
          type: string
        currentLevel:
          type: number
        requiredLevel:
          type: number
        gap:
          type: number
        priority:
          type: string
        resources:
          type: array
          items:
            type: string
    LearningPhase:
      type: object
      required: [phase, title, duration, skills, actions]
      properties:
        phase:
          type: number
        title:
          type: string
        duration:
          type: string
        skills:
          type: array
          items:
            type: string
        actions:
          type: array
          items:
            type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CareerQuizAnswer:
      type: object
      properties:
        questionId:
          type: string
        answer:
          type: string
      required:
        - questionId
        - answer
    CareerQuizAnswers:
      type: object
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/CareerQuizAnswer"
      required:
        - answers
    RoadmapStep:
      type: object
      properties:
        phase:
          type: string
        title:
          type: string
        description:
          type: string
        duration:
          type: string
        skills:
          type: array
          items:
            type: string
        resources:
          type: array
          items:
            type: string
      required:
        - phase
        - title
        - description
        - duration
        - skills
        - resources
    CareerRecommendation:
      type: object
      properties:
        careerTitle:
          type: string
        matchScore:
          type: number
        matchScoreBreakdown:
          type: string
        description:
          type: string
        whyGoodFit:
          type: string
        salaryRange:
          type: string
        jobOutlook:
          type: string
        keySkills:
          type: array
          items:
            type: string
        alternativeCareers:
          type: array
          items:
            type: string
        roadmap:
          type: array
          items:
            $ref: "#/components/schemas/RoadmapStep"
      required:
        - careerTitle
        - matchScore
        - matchScoreBreakdown
        - description
        - whyGoodFit
        - salaryRange
        - jobOutlook
        - keySkills
        - alternativeCareers
        - roadmap
    CareerQuestion:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
        category:
          type: string
        options:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              label:
                type: string
            required:
              - value
              - label
      required:
        - id
        - question
        - category
        - options
    CareerQuestionsResponse:
      type: object
      properties:
        questions:
          type: array
          items:
            $ref: "#/components/schemas/CareerQuestion"
      required:
        - questions
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
